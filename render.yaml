# Render Blueprint: one free Web Service that runs the API AND serves the built
# React app (single origin, no CORS, no second deploy).
#
# Deploy: push this repo to GitHub, then on Render -> "New +" -> "Blueprint",
# pick this repo. Set MONGO_URI (from MongoDB Atlas) when prompted.
services:
  - type: web
    name: virtual-wardrobe
    runtime: node
    plan: free
    # Server prod uses Atlas, so skip its devDeps (the in-memory Mongo binary).
    # Client needs its devDeps (vite) to build.
    buildCommand: npm install --omit=dev --prefix server && npm install --prefix client && npm run build --prefix client
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URI
        sync: false # paste your MongoDB Atlas connection string in the dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: SEED_DEMO
        value: "true"
      - key: NODE_VERSION
        value: "20"
